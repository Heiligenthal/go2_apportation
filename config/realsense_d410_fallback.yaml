realsense2_camera:
  ros__parameters:
    use_sim_time: false

    enable_color: false
    enable_depth: true
    enable_infra1: true
    enable_infra2: false
    enable_gyro: false
    enable_accel: false
    enable_sync: false

    depth_width: 640
    depth_height: 480
    depth_fps: 30

    infra_width: 640
    infra_height: 480
    infra_fps: 30

    # D410 fallback: no RGB path, no aligned_depth_to_color expectation.
    align_depth.enable: false

    clip_distance: 3.5

    # Keep the fallback lean; localization consumes images directly.
    pointcloud.enable: false

    decimation_filter.enable: true
    decimation_filter.filter_magnitude: 2

    temporal_filter.enable: true
    temporal_filter.filter_smooth_alpha: 0.4
    temporal_filter.filter_smooth_delta: 20
    temporal_filter.holes_fill: 1

    spatial_filter.enable: false
    hole_filling_filter.enable: false
