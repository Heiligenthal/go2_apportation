realsense2_camera:
  ros__parameters:
    use_sim_time: false

    enable_color: true
    enable_depth: true
    enable_infra1: false
    enable_infra2: false
    enable_gyro: false
    enable_accel: false
    enable_sync: true

    color_width: 640
    color_height: 480
    color_fps: 15

    depth_width: 640
    depth_height: 480
    depth_fps: 15

    align_depth.enable: true

    clip_distance: 3.0

    pointcloud.enable: true
    pointcloud.allow_no_texture_points: false
    pointcloud.ordered_pc: false

    decimation_filter.enable: true
    decimation_filter.filter_magnitude: 4

    temporal_filter.enable: true
    temporal_filter.filter_smooth_alpha: 0.4
    temporal_filter.filter_smooth_delta: 20
    temporal_filter.holes_fill: 1

    spatial_filter.enable: false

    hole_filling_filter.enable: false
