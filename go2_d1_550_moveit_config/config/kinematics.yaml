# Kinematics solver configuration for Go2 + D1-550
#
# Using KDL (default) for the arm.
# For better IK performance with the D1-550's geometry,
# consider switching to TracIK:
#   solver: trac_ik_kinematics_plugin/TRAC_IKKinematicsPlugin
#   (requires: sudo apt install ros-humble-trac-ik-kinematics-plugin)

arm:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.05
  kinematics_solver_attempts: 3

gripper:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.05
  kinematics_solver_attempts: 3
